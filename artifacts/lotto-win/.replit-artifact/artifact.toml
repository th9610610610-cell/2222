kind = "web"
previewPath = "/"
title = "Lotto Win"
version = "1.0.0"
id = "artifacts/lotto-win"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19713

[services.development]
run = "pnpm --filter @workspace/lotto-win run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lotto-win", "run", "build" ]
publicDir = "artifacts/lotto-win/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19713"
BASE_PATH = "/"
